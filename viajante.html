<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViagemFácil — Minha Viagem</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:var(--gray-50);
      min-height:100vh;
      color:var(--gray-800);
      font-size:14px;
      line-height:1.55;
    }

    /* ── TOPBAR ── */
    .topbar{
      background:white;
      border-bottom:1px solid var(--gray-200);
      height:60px;padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
      box-shadow:0 1px 4px rgba(0,0,0,.05);
    }
    .tb-brand{display:flex;align-items:center;gap:10px;}
    .tb-brand-icon{
      width:34px;height:34px;border-radius:9px;
      background:linear-gradient(135deg,var(--blue),var(--blue-mid));
      display:flex;align-items:center;justify-content:center;
      font-size:16px;color:white;
    }
    .tb-brand-name{font-size:15px;font-weight:800;color:var(--gray-900);}
    .tb-brand-name span{color:var(--blue);}
    .tb-right{display:flex;align-items:center;gap:12px;}
    .tb-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-600);}
    .tb-avatar{
      width:32px;height:32px;border-radius:50%;
      background:linear-gradient(135deg,var(--blue),var(--teal));
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;color:white;
    }
    .btn-logout{
      padding:7px 14px;border-radius:8px;
      background:var(--gray-100);border:none;cursor:pointer;
      font-family:inherit;font-size:12px;font-weight:600;
      color:var(--gray-600);transition:all .15s;
    }
    .btn-logout:hover{background:var(--gray-200);}

    /* ── MAIN ── */
    .main{max-width:800px;margin:0 auto;padding:28px 20px;}

    /* Hero card */
    .hero-card{
      background:linear-gradient(135deg,var(--blue) 0%,#1d4ed8 60%,var(--teal) 100%);
      border-radius:20px;padding:28px;color:white;
      margin-bottom:22px;position:relative;overflow:hidden;
    }
    .hero-card::before{
      content:'✈';position:absolute;right:20px;top:50%;transform:translateY(-50%);
      font-size:80px;opacity:.08;pointer-events:none;
    }
    .hero-greeting{font-size:13px;opacity:.75;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
    .hero-name{font-size:24px;font-weight:800;margin-top:4px;letter-spacing:-.4px;}
    .hero-trip{font-size:13px;opacity:.8;margin-top:6px;}
    .hero-chips{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
    .hero-chip{
      background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.2);
      border-radius:99px;padding:6px 14px;
      font-size:12px;font-weight:600;
    }

    /* Section title */
    .sec-title{
      font-size:16px;font-weight:800;color:var(--gray-900);
      letter-spacing:-.3px;margin-bottom:14px;
      display:flex;align-items:center;gap:8px;
    }
    .sec-title::after{content:'';flex:1;height:1px;background:var(--gray-200);}

    /* Info grid */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
    .info-card{
      background:white;border:1px solid var(--gray-200);
      border-radius:16px;padding:20px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
      transition:box-shadow .2s,transform .2s;
    }
    .info-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-1px);}
    .info-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .info-card-icon{
      width:40px;height:40px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:18px;
    }
    .ic-blue  {background:var(--blue-light);}
    .ic-green {background:#E6FAF4;}
    .ic-orange{background:#FFF1EB;}
    .ic-teal  {background:#E6FAF8;}
    .info-badge{
      font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
      display:inline-flex;align-items:center;gap:5px;
    }
    .info-badge::before{content:'';width:5px;height:5px;border-radius:50%;}
    .ib-green {background:#E6FAF4;color:var(--green);}   .ib-green::before{background:var(--green);}
    .ib-yellow{background:#FFFBF0;color:#D97706;}         .ib-yellow::before{background:#F6A623;}
    .ib-red   {background:#FFF5F5;color:#E53E3E;}         .ib-red::before{background:#E53E3E;}
    .ib-blue  {background:var(--blue-light);color:var(--blue);} .ib-blue::before{background:var(--blue);}
    .ib-gray  {background:var(--gray-100);color:var(--gray-500);} .ib-gray::before{background:var(--gray-400);}
    .info-val {font-size:26px;font-weight:800;color:var(--gray-900);letter-spacing:-1px;}
    .info-lbl {font-size:12px;color:var(--gray-500);margin-top:2px;font-weight:500;}

    /* Seat visual */
    .seat-visual{
      background:white;border:1px solid var(--gray-200);
      border-radius:16px;padding:22px;margin-bottom:24px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .seat-bus{
      display:flex;align-items:center;justify-content:center;
      gap:8px;margin:16px 0;
    }
    .bus-body{
      background:var(--gray-50);border:2px solid var(--gray-200);
      border-radius:8px;padding:14px;display:flex;gap:5px;flex-wrap:wrap;
      max-width:320px;justify-content:flex-start;
    }
    .mini-seat{
      width:26px;height:24px;border-radius:5px;
      background:var(--gray-200);border:1px solid var(--gray-300);
      font-size:9px;font-weight:700;color:var(--gray-500);
      display:flex;align-items:center;justify-content:center;
    }
    .mini-seat.mine{
      background:var(--blue);border-color:var(--blue-dark);
      color:white;box-shadow:0 2px 8px rgba(0,87,255,.4);
      transform:scale(1.15);
    }
    .mini-seat.taken{background:#FEE2E2;border-color:#FECACA;color:#E53E3E;}
    .mini-seat.driver{background:var(--gray-100);color:var(--gray-400);font-size:13px;}
    .mini-seat.gap{visibility:hidden;}

    /* Payment table */
    .pay-card{
      background:white;border:1px solid var(--gray-200);
      border-radius:16px;overflow:hidden;margin-bottom:24px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .pay-header{
      padding:16px 20px;border-bottom:1px solid var(--gray-100);
      display:flex;align-items:center;justify-content:space-between;
    }
    .pay-title{font-size:14px;font-weight:700;color:var(--gray-900);}
    .pay-prog{
      padding:16px 20px;
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;border-bottom:1px solid var(--gray-100);flex-wrap:wrap;
    }
    .pay-prog-info{flex:1;}
    .pay-prog-label{font-size:12px;color:var(--gray-500);margin-bottom:6px;}
    .pay-prog-bar{height:8px;background:var(--gray-100);border-radius:99px;overflow:hidden;}
    .pay-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 1s ease;}
    .pay-amount-wrap{text-align:right;flex-shrink:0;}
    .pay-amount-val{font-size:22px;font-weight:800;color:var(--green);}
    .pay-amount-lbl{font-size:11px;color:var(--gray-500);}

    .pay-hist{padding:0 20px;}
    .hist-row{
      display:flex;align-items:center;gap:12px;
      padding:12px 0;border-bottom:1px solid var(--gray-100);
    }
    .hist-row:last-child{border-bottom:none;}
    .hist-icon{
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      background:#E6FAF4;font-size:14px;
    }
    .hist-info{flex:1;}
    .hist-method{font-size:13px;font-weight:600;color:var(--gray-900);}
    .hist-meta{font-size:11px;color:var(--gray-500);margin-top:1px;}
    .hist-val{font-size:14px;font-weight:700;color:var(--green);flex-shrink:0;}

    /* Room card */
    .room-card-big{
      background:white;border:1px solid var(--gray-200);
      border-radius:16px;padding:22px;margin-bottom:24px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .room-display{
      display:flex;align-items:center;gap:20px;margin:16px 0;flex-wrap:wrap;
    }
    .room-number-big{
      width:80px;height:80px;border-radius:16px;
      background:linear-gradient(135deg,var(--blue),var(--blue-mid));
      display:flex;align-items:center;justify-content:center;
      font-size:32px;font-weight:800;color:white;
      box-shadow:0 6px 18px rgba(0,87,255,.3);flex-shrink:0;
    }
    .room-info-big{}
    .room-info-type{font-size:13px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;}
    .room-info-name{font-size:20px;font-weight:800;color:var(--gray-900);margin-top:2px;}
    .room-info-occ{font-size:13px;color:var(--gray-500);margin-top:4px;}
    .room-mates{display:flex;gap:-6px;margin-top:14px;}
    .mate-av{
      width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;color:white;
      border:2px solid white;
      margin-right:-8px;
    }
    .mate-label{font-size:12px;color:var(--gray-500);margin-top:8px;}

    /* Trip details */
    .trip-detail-card{
      background:white;border:1px solid var(--gray-200);
      border-radius:16px;padding:22px;margin-bottom:24px;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
    }
    .trip-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
    .td-field{display:flex;flex-direction:column;gap:3px;}
    .td-label{font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;}
    .td-value{font-size:14px;font-weight:600;color:var(--gray-900);}

    /* Alert (not registered) */
    .alert-box{
      background:#FFFBF0;border:1px solid rgba(246,166,35,.4);
      border-radius:12px;padding:16px 18px;
      font-size:13px;color:var(--gray-700);line-height:1.6;
      display:flex;gap:12px;align-items:flex-start;
    }
    .alert-box-icon{font-size:20px;flex-shrink:0;}

    /* Not found */
    .not-found{
      text-align:center;padding:60px 20px;
      background:white;border-radius:16px;border:1px solid var(--gray-200);
    }
    .not-found-icon{font-size:48px;margin-bottom:14px;}
    .not-found-title{font-size:18px;font-weight:800;color:var(--gray-900);}
    .not-found-sub{font-size:13px;color:var(--gray-500);margin-top:6px;max-width:320px;margin-left:auto;margin-right:auto;}
    .btn-back{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:20px;padding:10px 22px;border-radius:10px;
      background:var(--blue);color:white;border:none;cursor:pointer;
      font-family:inherit;font-size:14px;font-weight:600;
      box-shadow:0 4px 12px rgba(0,87,255,.25);
      text-decoration:none;transition:all .15s;
    }
    .btn-back:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,87,255,.35);}

    @media(max-width:600px){
      .info-grid{grid-template-columns:1fr;}
      .trip-detail-grid{grid-template-columns:1fr;}
      .room-display{flex-direction:column;}
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="tb-brand">
    <div class="tb-brand-icon">✈</div>
    <div class="tb-brand-name">Viagem<span>Fácil</span></div>
  </div>
  <div class="tb-right">
    <div class="tb-user">
      <div class="tb-avatar" id="tb-av">?</div>
      <span id="tb-username">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<main class="main" id="main-content">
  <!-- Rendered by JS -->
</main>

<script>
// ── CSS vars inline ──────────────────────
const cssVars = {
  '--blue':'#0057FF','--blue-mid':'#3B7BFF','--blue-light':'#EEF3FF','--blue-dark':'#003FBD',
  '--teal':'#00C4B4','--teal-light':'#E6FAF8','--orange':'#FF6B2B','--orange-lt':'#FFF1EB',
  '--green':'#00B37E','--red':'#E53E3E',
  '--gray-50':'#F9FAFB','--gray-100':'#F3F4F6','--gray-200':'#E5E7EB','--gray-300':'#D1D5DB',
  '--gray-400':'#9CA3AF','--gray-500':'#6B7280','--gray-600':'#4B5563',
  '--gray-700':'#374151','--gray-800':'#1F2937','--gray-900':'#111827',
};
Object.entries(cssVars).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));

// ── AUTH CHECK ───────────────────────────
const role = sessionStorage.getItem('vf_role');
if (role !== 'viajante') { window.location.href = 'login.html'; }

const NOME_LOGIN = (sessionStorage.getItem('vf_viajante_nome') || '').trim();
const CPF_LOGIN  = (sessionStorage.getItem('vf_viajante_cpf')  || '').trim();

function logout() {
  sessionStorage.clear();
  window.location.href = 'login.html';
}

// ── SHARED DATA (mirrored from admin app via sessionStorage key) ─────
// The admin app saves App state to sessionStorage on every change
// If not present, use built-in demo data
function loadAppData() {
  const raw = sessionStorage.getItem('vf_app_data');
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  // Built-in demo data (matches init.js)
  return {
    viajantes: [
      { id:1000, nome:'Maria Santos',    cpf:'123.456.789-00', tel:'(61) 99901-1111', valor:380, gen:'Feminino',  nasc:'1980-03-15', email:'maria@email.com',  obs:'',  status:'Confirmado', assento:1,  quarto:1 },
      { id:1001, nome:'João Oliveira',   cpf:'234.567.890-11', tel:'(61) 99902-2222', valor:380, gen:'Masculino', nasc:'1975-07-22', email:'joao@email.com',   obs:'',  status:'Pendente',   assento:2,  quarto:1 },
      { id:1002, nome:'Ana Lima',        cpf:'345.678.901-22', tel:'(61) 99903-3333', valor:420, gen:'Feminino',  nasc:'1992-11-08', email:'ana@email.com',    obs:'',  status:'Confirmado', assento:null, quarto:2 },
      { id:1003, nome:'Pedro Souza',     cpf:'456.789.012-33', tel:'(61) 99904-4444', valor:380, gen:'Masculino', nasc:'1988-05-30', email:'pedro@email.com',  obs:'',  status:'Pendente',   assento:3,  quarto:2 },
      { id:1004, nome:'Carla Mendes',    cpf:'567.890.123-44', tel:'(61) 99905-5555', valor:380, gen:'Feminino',  nasc:'1995-02-18', email:'carla@email.com',  obs:'',  status:'Pendente',   assento:null, quarto:3 },
      { id:1005, nome:'Lucas Ferreira',  cpf:'678.901.234-55', tel:'(61) 99906-6666', valor:350, gen:'Masculino', nasc:'2000-09-12', email:'lucas@email.com',  obs:'',  status:'Pendente',   assento:4,  quarto:3 },
    ],
    pagamentos: {
      1000: { pago:380, hist:[{ val:380, met:'📱 PIX',          obs:'Pagamento integral', data:'10/01/2025', hora:'09:15' }] },
      1001: { pago:200, hist:[{ val:200, met:'💵 Dinheiro',      obs:'1ª parcela',         data:'09/02/2025', hora:'14:30' }] },
      1002: { pago:420, hist:[{ val:200, met:'💳 Cartão',        obs:'1ª parcela',         data:'15/02/2025', hora:'10:00' },
                               { val:220, met:'📱 PIX',          obs:'Saldo restante',     data:'05/03/2025', hora:'16:45' }] },
      1003: { pago:0,   hist:[] },
      1004: { pago:100, hist:[{ val:100, met:'🏦 Transferência', obs:'Entrada',            data:'20/03/2025', hora:'11:00' }] },
      1005: { pago:0,   hist:[] },
    },
    hotelCfg: { n:12, cap:4 },
    quartos: { 1:[1000,1001], 2:[1002,1003], 3:[1004,1005] },
    assentos: { 1:1000, 2:1001, 3:1003, 4:1005 },
  };
}

// ── HELPERS ─────────────────────────────
function pad(n){ return n<10?'0'+n:String(n); }
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function fmtBRL(n){ return 'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
const AVATAR_COLORS = ['background:linear-gradient(135deg,#0057FF,#3B7BFF)',
  'background:linear-gradient(135deg,#00C4B4,#00a896)',
  'background:linear-gradient(135deg,#FF6B2B,#ff8c55)',
  'background:linear-gradient(135deg,#00B37E,#00cc8f)'];
function avColor(name){ return AVATAR_COLORS[(name.charCodeAt(0)||0)%AVATAR_COLORS.length]; }

// ── FIND VIAJANTE ────────────────────────
const appData = loadAppData();
// Match by CPF only (login now uses CPF + senha, nome is display only)
let viajante = appData.viajantes.find(v =>
  v.cpf.replace(/\D/g,'') === CPF_LOGIN.replace(/\D/g,'')
);

// Fallback: check localStorage accounts (self-registered, ADM not yet loaded)
if (!viajante) {
  try {
    const savedAccs = JSON.parse(localStorage.getItem('vf_accounts') || '[]');
    const acc = savedAccs.find(a => a.cpf.replace(/\D/g,'') === CPF_LOGIN.replace(/\D/g,''));
    if (acc) {
      // Build a minimal viajante object for display
      viajante = {
        id: acc.id, nome: acc.nome, cpf: acc.cpf, tel: acc.tel,
        valor: 0, gen: acc.gen||'', nasc: acc.nasc||'', email: acc.email||'',
        obs: acc.obs||'', status: 'Pendente', assento: null, quarto: null,
        _selfReg: true, // no seat/room/payment yet
      };
    }
  } catch(e) {}
}

// ── SET TOPBAR ──────────────────────────
if (viajante) {
  document.getElementById('tb-username').textContent = viajante.nome.split(' ')[0];
  document.getElementById('tb-av').textContent = initials(viajante.nome);
}

// ── RENDER ──────────────────────────────
const main = document.getElementById('main-content');

if (!viajante) {
  main.innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">Viajante não encontrado</div>
      <div class="not-found-sub">Não encontramos um cadastro com o CPF informado. Verifique seus dados ou fale com o administrador.</div>
      <a class="btn-back" href="login.html">← Voltar ao Login</a>
    </div>`;
} else if (viajante._selfReg || (viajante.status === 'Pendente' && viajante.valor === 0)) {
  // Self-registered, waiting for ADM approval and value definition
  main.innerHTML = `
    <div style="max-width:480px;margin:0 auto;text-align:center;padding:40px 20px">
      <div style="font-size:60px;margin-bottom:18px">⏳</div>
      <div style="font-size:22px;font-weight:800;color:var(--gray-900);letter-spacing:-.4px">Cadastro em análise</div>
      <div style="font-size:14px;color:var(--gray-500);margin-top:8px;line-height:1.7;max-width:380px;margin-left:auto;margin-right:auto">
        Seu cadastro foi recebido com sucesso! O administrador precisa confirmar sua participação e definir o valor da viagem.
        Você receberá acesso completo assim que for aprovado.
      </div>

      <div style="background:white;border:1px solid var(--gray-200);border-radius:18px;padding:22px 24px;margin-top:28px;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.06)">
        <div style="font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Seus dados cadastrados</div>
        ${[
          ['👤 Nome',      viajante.nome],
          ['🪪 CPF',       viajante.cpf],
          ['📱 Telefone',  viajante.tel],
          ['📧 E-mail',    viajante.email||'—'],
          ['📅 Cadastro',  viajante.createdAt||'—'],
        ].map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100)">
            <span style="font-size:13px;color:var(--gray-500)">${k}</span>
            <span style="font-size:13px;font-weight:600;color:var(--gray-900)">${v}</span>
          </div>`).join('')}
      </div>

      <div style="background:linear-gradient(135deg,var(--blue),#1d4ed8);border-radius:16px;padding:18px 22px;margin-top:18px;color:white;text-align:left">
        <div style="font-size:13px;font-weight:700;margin-bottom:6px">O que acontece agora?</div>
        <div style="font-size:12px;opacity:.85;line-height:1.7">
          1. O administrador revisa seu cadastro<br>
          2. Define o valor da sua participação<br>
          3. Aloca seu assento e quarto<br>
          4. Você tem acesso completo ao portal
        </div>
      </div>

      <button class="btn-back" style="margin-top:22px;display:inline-flex" onclick="logout()">Sair</button>
    </div>`;
} else {
  renderPortal(viajante, appData);
}

function renderPortal(v, data) {
  const pg      = data.pagamentos[v.id] || { pago:0, hist:[] };
  const saldo   = v.valor - pg.pago;
  const pct     = v.valor ? Math.round(pg.pago / v.valor * 100) : 0;

  // Status badge
  let pgLabel, pgClass;
  if (pg.pago >= v.valor - 0.01) { pgLabel='Pago'; pgClass='ib-green'; }
  else if (pg.pago > 0)          { pgLabel='Parcial'; pgClass='ib-yellow'; }
  else                           { pgLabel='Pendente'; pgClass='ib-red'; }

  // Quarto info
  const quartoNum = v.quarto;
  let quartomates = [];
  if (quartoNum && data.quartos[quartoNum]) {
    quartomates = data.quartos[quartoNum]
      .map(id => data.viajantes.find(x => x.id === id))
      .filter(x => x && x.id !== v.id);
  }

  // Build seat mini-map (only 12 seats for visual)
  const seatMini = buildMiniSeats(data, v.assento);

  main.innerHTML = `
    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-greeting">Bem-vindo(a) de volta</div>
      <div class="hero-name">${v.nome}</div>
      <div class="hero-trip">✈ Retiro Espiritual 2025 &nbsp;·&nbsp; 15 a 18 de Agosto</div>
      <div class="hero-chips">
        <div class="hero-chip">📅 4 dias de viagem</div>
        <div class="hero-chip">🚌 Ônibus fretado</div>
        <div class="hero-chip">🏨 Hotel incluído</div>
      </div>
    </div>

    <!-- INFO CARDS -->
    <div class="sec-title">📋 Resumo da sua viagem</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-top">
          <div class="info-card-icon ic-blue">🪑</div>
          <span class="info-badge ${v.assento ? 'ib-blue' : 'ib-gray'}">${v.assento ? 'Confirmado' : 'Não atribuído'}</span>
        </div>
        <div class="info-val">${v.assento ? pad(v.assento) : '—'}</div>
        <div class="info-lbl">Seu assento no ônibus</div>
      </div>
      <div class="info-card">
        <div class="info-card-top">
          <div class="info-card-icon ic-teal">🏨</div>
          <span class="info-badge ${quartoNum ? 'ib-blue' : 'ib-gray'}">${quartoNum ? 'Alocado' : 'Não atribuído'}</span>
        </div>
        <div class="info-val">${quartoNum ? pad(quartoNum) : '—'}</div>
        <div class="info-lbl">Seu quarto no hotel</div>
      </div>
      <div class="info-card">
        <div class="info-card-top">
          <div class="info-card-icon ic-green">💰</div>
          <span class="info-badge ${pgClass}">${pgLabel}</span>
        </div>
        <div class="info-val">${fmtBRL(pg.pago)}</div>
        <div class="info-lbl">Valor pago de ${fmtBRL(v.valor)}</div>
      </div>
      <div class="info-card">
        <div class="info-card-top">
          <div class="info-card-icon ic-orange">📌</div>
          <span class="info-badge ${v.status === 'Confirmado' ? 'ib-green' : 'ib-yellow'}">${v.status}</span>
        </div>
        <div class="info-val" style="font-size:18px;margin-top:6px">${v.status}</div>
        <div class="info-lbl">Status da inscrição</div>
      </div>
    </div>

    <!-- SEAT SECTION -->
    <div class="sec-title">🚌 Seu lugar no ônibus</div>
    ${v.assento ? `
    <div class="seat-visual">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:13px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Assento</div>
          <div style="font-size:40px;font-weight:800;color:var(--blue);letter-spacing:-2px">${pad(v.assento)}</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:2px">Fileira ${Math.ceil(v.assento/4)} · Posição ${((v.assento-1)%4)+1}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;text-align:center">Mapa do ônibus</div>
          <div class="bus-body">${seatMini}</div>
          <div style="font-size:10px;color:var(--gray-400);margin-top:8px;display:flex;gap:12px;justify-content:center">
            <span>🟦 Seu assento</span>
            <span>🟥 Ocupado</span>
            <span>⬜ Livre</span>
          </div>
        </div>
      </div>
    </div>` : `
    <div class="alert-box" style="margin-bottom:24px">
      <span class="alert-box-icon">ℹ️</span>
      <div>Seu assento ainda não foi atribuído pelo administrador. Assim que for definido, aparecerá aqui automaticamente.</div>
    </div>`}

    <!-- HOTEL SECTION -->
    <div class="sec-title">🏨 Seu quarto no hotel</div>
    ${quartoNum ? `
    <div class="room-card-big">
      <div class="room-display">
        <div class="room-number-big">${pad(quartoNum)}</div>
        <div class="room-info-big">
          <div class="room-info-type">Quarto</div>
          <div class="room-info-name">Nº ${pad(quartoNum)}</div>
          <div class="room-info-occ">🛏 ${quartomates.length + 1} hóspede${quartomates.length + 1 !== 1 ? 's' : ''} neste quarto</div>
          ${quartomates.length ? `
          <div class="mate-label" style="margin-top:12px;font-size:12px;color:var(--gray-500);font-weight:600">Companheiros de quarto:</div>
          <div class="room-mates" style="margin-top:8px">
            ${quartomates.map((m,i) => `<div class="mate-av" style="${avColor(m.nome)}" title="${m.nome}">${initials(m.nome)}</div>`).join('')}
            <span style="margin-left:16px;font-size:13px;color:var(--gray-600);align-self:center">
              ${quartomates.map(m => m.nome.split(' ')[0]).join(', ')}
            </span>
          </div>` : `
          <div style="font-size:12px;color:var(--gray-400);margin-top:8px">Você está sozinho(a) neste quarto por enquanto.</div>`}
        </div>
      </div>
    </div>` : `
    <div class="alert-box" style="margin-bottom:24px">
      <span class="alert-box-icon">ℹ️</span>
      <div>Seu quarto ainda não foi atribuído. O administrador fará a alocação em breve.</div>
    </div>`}

    <!-- PAYMENT SECTION -->
    <div class="sec-title">💳 Seu histórico de pagamentos</div>
    <div class="pay-card">
      <div class="pay-header">
        <div class="pay-title">Situação financeira</div>
        <span class="info-badge ${pgClass}">${pgLabel}</span>
      </div>
      <div class="pay-prog">
        <div class="pay-prog-info">
          <div class="pay-prog-label">Progresso do pagamento — ${pct}% quitado</div>
          <div class="pay-prog-bar">
            <div class="pay-prog-fill" style="width:${pct}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--gray-500)">
            <span>Pago: <strong style="color:var(--green)">${fmtBRL(pg.pago)}</strong></span>
            <span>Total: <strong>${fmtBRL(v.valor)}</strong></span>
          </div>
        </div>
        <div class="pay-amount-wrap">
          <div class="pay-amount-val">${fmtBRL(saldo > 0.01 ? saldo : 0)}</div>
          <div class="pay-amount-lbl">${saldo > 0.01 ? 'saldo restante' : '✓ quitado'}</div>
        </div>
      </div>
      <div class="pay-hist">
        ${pg.hist.length ? pg.hist.map(h => `
          <div class="hist-row">
            <div class="hist-icon">💰</div>
            <div class="hist-info">
              <div class="hist-method">${h.met}</div>
              <div class="hist-meta">${h.data} às ${h.hora}${h.obs ? ' · ' + h.obs : ''}</div>
            </div>
            <div class="hist-val">${fmtBRL(h.val)}</div>
          </div>`).join('') : `
          <div style="text-align:center;padding:24px;color:var(--gray-500);font-size:13px">
            <div style="font-size:28px;margin-bottom:8px">💳</div>
            Nenhum pagamento registrado ainda.
          </div>`}
      </div>
    </div>

    <!-- TRIP DETAILS -->
    <div class="sec-title">📍 Detalhes da viagem</div>
    <div class="trip-detail-card">
      <div class="trip-detail-grid">
        <div class="td-field"><div class="td-label">Viagem</div><div class="td-value">Retiro Espiritual 2025</div></div>
        <div class="td-field"><div class="td-label">Datas</div><div class="td-value">15 a 18 de Agosto de 2025</div></div>
        <div class="td-field"><div class="td-label">Saída</div><div class="td-value">Brasília, DF — 6h00</div></div>
        <div class="td-field"><div class="td-label">Destino</div><div class="td-value">A confirmar com ADM</div></div>
        <div class="td-field"><div class="td-label">Transporte</div><div class="td-value">🚌 Ônibus fretado (44 lugares)</div></div>
        <div class="td-field"><div class="td-label">Hospedagem</div><div class="td-value">🏨 Hotel incluso (${data.hotelCfg.n} quartos)</div></div>
      </div>
      ${v.obs ? `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--gray-100)">
        <div class="td-label">Suas observações</div>
        <div style="font-size:13px;color:var(--gray-700);margin-top:4px">${v.obs}</div>
      </div>` : ''}
    </div>

    <!-- CONTACT -->
    <div class="trip-detail-card">
      <div class="sec-title" style="margin-bottom:10px">📞 Em caso de dúvidas</div>
      <p style="font-size:13px;color:var(--gray-600);line-height:1.7">
        Para informações sobre pagamentos, mudanças de assento ou quarto, entre em contato diretamente com o administrador da viagem.
        Não compartilhe seus dados de acesso com outras pessoas.
      </p>
    </div>
  `;
}

// ── MINI SEAT MAP ────────────────────────
function buildMiniSeats(data, myAssento) {
  let html = '';
  // Driver
  html += '<div class="mini-seat driver">🧑‍✈️</div>';
  for (let i = 0; i < 4; i++) html += '<div class="mini-seat gap"></div>';

  for (let i = 1; i <= 44; i++) {
    if ((i-1) % 4 === 2) html += '<div class="mini-seat gap"></div>';
    const taken = data.assentos && data.assentos[i];
    let cls = '';
    if (i === myAssento) cls = 'mine';
    else if (taken)      cls = 'taken';
    html += `<div class="mini-seat ${cls}" title="Assento ${pad(i)}">${pad(i)}</div>`;
  }
  return html;
}
</script>
</body>
</html>
